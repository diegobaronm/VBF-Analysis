# --------------------------------------------------
# Configuration for SignificanceScan.py
# --------------------------------------------------

# Path to the directory containing the ROOT files
path: /Users/user/Documents/HEP/VBF-Analysis/VBFAnalysisPlots/TauTau/TauhadTaulep/Zpeak/BDT5FoldsOS/

# Comma-separated list of background ROOT file names
background_files: VV.root, VV_EWK.root, Wjets.root, W_EWK_Sherpa.root, Zjets.root, ttbar.root, singletop.root, MJ.root, Higgs.root, Higgs_truth_EWK.root, Ztautau_SherpaNLO_RWParabolicCutoffClosure.root, Signal_truth_PoPy.root

# Comma-separated list of signal ROOT file names
signal_files: Zprime_200.root

# Special signal blocks: each entry defines its own signal and background samples.
# Uncomment and adjust as needed.
special_signal:
  - signal_samples: Signal_truth_PoPy.root
    bg_samples: VV.root, VV_EWK.root, Wjets.root, W_EWK_Sherpa.root, Zjets.root, ttbar.root, singletop.root, MJ.root, Higgs.root, Ztautau_SherpaNLO_RWParabolicCutoffClosure.root, Higgs_truth_EWK.root
  - signal_samples: Signal_truth_Sherpa.root
    bg_samples: VV.root, VV_EWK.root, Wjets.root, W_EWK_Sherpa.root, Zjets.root, ttbar.root, singletop.root, MJ.root, Higgs.root, Ztautau_SherpaNLO_RWParabolicCutoffClosure.root, Higgs_truth_EWK.root


# Name of the histogram to use for the cut scan
histogram: bdtScore

# Scaling factors: samples (without .root) to scale before summing.
# Uncomment and adjust as needed.
scaling_factors:
  - Signal_truth_PoPy: 0.720
  - Signal_truth_Sherpa: 0.870
  - Ztautau_SherpaNLO_RWParabolicCutoffClosure: 1.1

# Cut values to scan (events to the RIGHT of each cut are integrated)
cut_values: [-1.0, -0.4, -0.15, 0.1, 0.3, 0.5, 0.75, 1.0]

# Bin edges for rebinning the histogram (optional, remove to skip rebinning)
bin_edges: [-1.0, -0.8, -0.6, -0.4, -0.15, 0.1, 0.3, 0.5, 0.75, 1.0]
